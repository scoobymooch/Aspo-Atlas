name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # GitHub Actions deliberately doesn't let a push made with the default GITHUB_TOKEN
  # (e.g. update-transport.yml committing fresh data) trigger other `push`-triggered
  # workflows, to avoid infinite loops. Without this, a new data commit would sit on
  # main until something else happened to push again or someone redeployed manually.
  workflow_run:
    workflows: ["Update transport timetables"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
